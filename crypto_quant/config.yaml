# ============================================
# 加密货币量化交易系统 - 配置文件
# ============================================

# 运行模式: paper (模拟) / live (实盘)
mode: paper

# Binance API 配置 (实盘模式需要填写)
binance:
  api_key: ""
  api_secret: ""
  testnet: true

# OKX API 配置
okx:
  api_key: ""
  api_secret: ""
  password: ""
  testnet: true

# 交易所配置
exchange:
  id: binance
  testnet: true

# 交易配置
trading:
  default_symbol: "BTCUSDT"
  default_leverage: 3
  default_quantity: 0.01
  offline_pause: true              # 断网时暂停交易，不使用随机模拟数据
  timezone: "Asia/Shanghai"        # 统一时区，默认东八区
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - DOGEUSDT
    - BNBUSDT

# 风险控制
risk:
  max_position_pct: 0.3          # 单币种最大仓位比例
  max_total_position_pct: 0.8    # 总仓位上限
  max_daily_loss_pct: 0.05       # 日最大亏损比例
  max_consecutive_losses: 3      # 连续亏损暂停次数
  stop_loss_pct: 0.05            # 默认止损比例
  take_profit_pct: 0.10          # 默认止盈比例
  position_sizing: fixed         # 仓位计算: fixed / kelly / atr

# 数据配置
data:
  db_path: "data/market.db"
  kline_intervals:
    - 1m
    - 5m
    - 15m
    - 1h
    - 4h
    - 1d

# 回测配置
backtest:
  initial_capital: 10000         # 初始资金 (USDT)
  commission: 0.0005             # 手续费率 (0.05% taker)
  slippage: 0.0002               # 基础滑点 (0.02%)
  slippage_model: volume         # fixed / volume (成交量加权)
  funding_rate: 0.0001           # 资金费率 (每8小时 0.01%)
  position_pct: 0.3              # 单次开仓比例
  default_leverage: 3            # 默认杠杆
  dynamic_leverage: true         # 动态杠杆(回撤>10%降为1/2, >15%降为1/3, 连赢+低回撤+1x)
  dynamic_trailing_stop: true    # 动态移动止损(ATR×2跟踪, 最低保本ATR×1.5)

# 告警配置
alerts:
  telegram_bot_token: ""
  telegram_chat_id: ""
  enabled: false

# Web 服务
web:
  host: "0.0.0.0"
  port: 8000
