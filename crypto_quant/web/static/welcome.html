<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>欢迎 - 量化交易系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #13141d;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: pan-y pinch-zoom;
}

.welcome-container {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.slides-wrapper {
    display: flex;
    width: 300%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.slide {
    width: 33.333%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
}

.slide-icon {
    font-size: 72px;
    margin-bottom: 24px;
}

.slide-title {
    font-size: 24px;
    font-weight: bold;
    color: #4fc3f7;
    margin-bottom: 12px;
}

.slide-desc {
    font-size: 15px;
    color: #8b8fa8;
    line-height: 1.8;
    max-width: 320px;
    margin-bottom: 24px;
}

.feature-list {
    text-align: left;
    max-width: 320px;
    margin: 0 auto;
}

.feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    font-size: 15px;
    color: #c0c4d8;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.feature-item:last-child {
    border-bottom: none;
}

.feature-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4fc3f7;
    flex-shrink: 0;
}

/* Exchange connection form */
.exchange-form {
    width: 100%;
    max-width: 320px;
    text-align: left;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 13px;
    color: #8b8fa8;
    margin-bottom: 6px;
}

.form-select, .form-input {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    background: #1a1d2e;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.form-select:focus, .form-input:focus {
    border-color: #4fc3f7;
}

.form-select option {
    background: #1a1d2e;
    color: #e0e0e0;
}

.test-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid #4fc3f7;
    border-radius: 8px;
    background: rgba(79,195,247,0.1);
    color: #4fc3f7;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}

.test-btn:hover {
    background: rgba(79,195,247,0.2);
}

.test-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.test-result {
    margin-top: 8px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
}

.test-result.success {
    color: #4caf84;
}

.test-result.error {
    color: #ff5252;
}

/* Bottom controls */
.bottom-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background: linear-gradient(to top, #13141d 60%, transparent);
}

.dots {
    display: flex;
    gap: 8px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
}

.dot.active {
    background: #4fc3f7;
    width: 24px;
    border-radius: 4px;
}

.btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 320px;
}

.btn-skip {
    flex: 0 0 auto;
    padding: 14px 24px;
    border: none;
    border-radius: 25px;
    background: transparent;
    color: #8b8fa8;
    font-size: 14px;
    cursor: pointer;
}

.btn-primary {
    flex: 1;
    padding: 14px 24px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #4fc3f7, #2196f3);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
}

.btn-primary:hover {
    opacity: 0.9;
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>
<body>
<div class="welcome-container">
    <div class="slides-wrapper" id="slides-wrapper">
        <!-- Slide 1: Welcome -->
        <div class="slide">
            <div class="slide-icon">📊</div>
            <div class="slide-title">欢迎使用量化交易系统</div>
            <div class="slide-desc">智能策略驱动，让交易更简单</div>
            <div class="feature-list">
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>24种智能策略，覆盖趋势/震荡/套利</span>
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>智能风控系统，自动止损止盈</span>
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>实时监控，WebSocket毫秒级推送</span>
                </div>
            </div>
        </div>

        <!-- Slide 2: Connect Exchange -->
        <div class="slide">
            <div class="slide-icon">🔗</div>
            <div class="slide-title">连接交易所</div>
            <div class="slide-desc">配置交易所API，开始自动化交易</div>
            <div class="exchange-form">
                <div class="form-group">
                    <label>选择交易所</label>
                    <select id="exchange-select" class="form-select">
                        <option value="binance">币安 Binance</option>
                        <option value="okx">欧易 OKX</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" id="api-key-input" class="form-input" placeholder="请输入API Key">
                </div>
                <div class="form-group">
                    <label>API Secret</label>
                    <input type="password" id="api-secret-input" class="form-input" placeholder="请输入API Secret">
                </div>
                <button class="test-btn" id="test-connection-btn" onclick="testConnection()">🔍 测试连接</button>
                <div class="test-result" id="test-result"></div>
            </div>
        </div>

        <!-- Slide 3: Start Trading -->
        <div class="slide">
            <div class="slide-icon">🚀</div>
            <div class="slide-title">开始交易</div>
            <div class="slide-desc">模拟盘零风险，熟悉后再切实盘</div>
            <div class="feature-list">
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>模拟盘：虚拟资金，零风险练习</span>
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>实盘模式：真实资金，严格风控</span>
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>一键开箱：自动配置最优策略</span>
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span>
                    <span>随时切换，灵活掌控</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom controls -->
    <div class="bottom-controls">
        <div class="dots" id="dots">
            <div class="dot active" data-index="0"></div>
            <div class="dot" data-index="1"></div>
            <div class="dot" data-index="2"></div>
        </div>
        <div class="btn-row">
            <button class="btn-skip" id="skip-btn" onclick="finishOnboarding()">跳过</button>
            <button class="btn-primary" id="action-btn" onclick="nextSlide()">下一步</button>
        </div>
    </div>
</div>

<script>
let currentSlide = 0;
const totalSlides = 3;
let touchStartX = 0;
let touchStartY = 0;
let isDragging = false;

const wrapper = document.getElementById('slides-wrapper');
const dots = document.querySelectorAll('.dot');
const actionBtn = document.getElementById('action-btn');

function goToSlide(index) {
    if (index < 0 || index >= totalSlides) return;
    currentSlide = index;
    wrapper.style.transform = `translateX(-${currentSlide * 33.333}%)`;

    dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));

    if (currentSlide === totalSlides - 1) {
        actionBtn.textContent = '🚀 开始使用';
        actionBtn.onclick = finishOnboarding;
    } else {
        actionBtn.textContent = '下一步';
        actionBtn.onclick = nextSlide;
    }
}

function nextSlide() {
    if (currentSlide < totalSlides - 1) {
        goToSlide(currentSlide + 1);
    }
}

function prevSlide() {
    if (currentSlide > 0) {
        goToSlide(currentSlide - 1);
    }
}

function finishOnboarding() {
    localStorage.setItem('onboarding_done', 'true');
    window.location.href = '/static/index.html';
}

// Touch swipe support
wrapper.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging = true;
}, { passive: true });

wrapper.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
}, { passive: true });

wrapper.addEventListener('touchend', (e) => {
    if (!isDragging) return;
    isDragging = false;
    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const diffX = touchStartX - touchEndX;
    const diffY = touchStartY - touchEndY;

    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
        if (diffX > 0) {
            nextSlide();
        } else {
            prevSlide();
        }
    }
});

// Dot click navigation
dots.forEach(dot => {
    dot.addEventListener('click', () => {
        goToSlide(parseInt(dot.dataset.index));
    });
});

// Exchange connection test
async function testConnection() {
    const exchange = document.getElementById('exchange-select').value;
    const apiKey = document.getElementById('api-key-input').value.trim();
    const apiSecret = document.getElementById('api-secret-input').value.trim();
    const resultEl = document.getElementById('test-result');
    const btn = document.getElementById('test-connection-btn');

    if (!apiKey || !apiSecret) {
        resultEl.textContent = '请填写 API Key 和 Secret';
        resultEl.className = 'test-result error';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 测试中...';
    resultEl.textContent = '';
    resultEl.className = 'test-result';

    try {
        const res = await fetch('/api/exchange/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                exchange_id: exchange,
                api_key: apiKey,
                api_secret: apiSecret,
                testnet: true,
            }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
            resultEl.textContent = `✅ 连接成功 - ${data.message}`;
            resultEl.className = 'test-result success';
        } else {
            resultEl.textContent = `❌ ${data.detail || '连接失败'}`;
            resultEl.className = 'test-result error';
        }
    } catch (e) {
        resultEl.textContent = `❌ 网络错误: ${e.message}`;
        resultEl.className = 'test-result error';
    } finally {
        btn.disabled = false;
        btn.textContent = '🔍 测试连接';
    }
}
</script>
</body>
</html>
