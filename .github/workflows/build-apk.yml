name: 打包 APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool cmake libffi-dev libssl-dev libltdl-dev \
            python3-dev ccache expect

      - name: 安装 Buildozer
        run: pip3 install --user buildozer cython

      - name: 缓存 Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            .buildozer/android/platform
          key: ${{ runner.os }}-android-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 打包 APK
        run: |
          expect -c '
          set timeout 7200
          spawn buildozer android debug
          expect {
              "continue" { send "y\r"; exp_continue }
              "already exists" { send "y\r"; exp_continue }
              "Are you sure" { send "y\r"; exp_continue }
              timeout { puts "TIMEOUT"; exit 1 }
              eof
          }
          '

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: crypto-quant-apk
          path: bin/*.apk
          retention-days: 30

      - name: 创建 Release（仅 tag 推送时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          generate_release_notes: true
