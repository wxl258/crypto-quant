name: 打包 APK (Chaquopy)

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Python 3.10（Chaquopy buildPython）
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 验证 Python 版本
        run: |
          python3 --version
          which python3

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android_app/**/*.gradle*', 'android_app/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 缓存 Chaquopy Python 包
        uses: actions/cache@v4
        with:
          path: |
            ~/.chaquopy
            android_app/app/build/chaquopy
          key: chaquopy-${{ runner.os }}-v1-${{ hashFiles('android_app/app/build.gradle.kts') }}
          restore-keys: |
            chaquopy-${{ runner.os }}-v1-

      - name: 授予 gradlew 执行权限
        run: chmod +x android_app/gradlew

      - name: 构建 Debug APK
        working-directory: android_app
        run: ./gradlew assembleDebug --stacktrace --warning-mode all

      - name: 列出 APK 文件
        run: |
          echo "=== 查找所有 APK 文件 ==="
          find android_app -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== 文件大小 ==="
          find android_app -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoQuant-v1.0.0-debug
          path: android_app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 构建摘要
        run: |
          echo "============================================"
          echo "  CryptoQuant APK 构建完成！"
          echo "  方案: Chaquopy 17.0 + Python 3.10"
          echo "============================================"
          find android_app -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null
          echo "============================================"
