name: CI — 代码检查 & APK 构建

on:
  push:
    branches: [main, master]
    paths:
      - 'crypto_quant/**'
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
      - 'VERSION'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Python 代码质量检查 ──
  lint:
    name: Python 代码检查
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r crypto_quant/requirements.txt
          pip install ruff pytest

      - name: Ruff 代码检查
        run: ruff check crypto_quant/ --ignore=E501,E402

      - name: 运行测试
        run: |
          cd crypto_quant
          python -m pytest tests/ -v --tb=short || echo "⚠️ 部分测试未通过（非阻塞）"

  # ── APK 构建 ──
  build:
    name: 构建 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Python 3.10（Chaquopy buildPython）
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 验证 Python 版本
        run: |
          python3 --version
          which python3

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android_app/**/*.gradle*', 'android_app/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 缓存 Chaquopy Python 包
        uses: actions/cache@v4
        with:
          path: |
            ~/.chaquopy
            android_app/app/build/chaquopy
          key: chaquopy-${{ runner.os }}-v2-${{ hashFiles('android_app/app/build.gradle.kts', 'crypto_quant/requirements.txt') }}
          restore-keys: |
            chaquopy-${{ runner.os }}-v1-

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: 授予 gradlew 执行权限
        run: chmod +x android_app/gradlew

      - name: 构建 Debug APK
        working-directory: android_app
        run: ./gradlew assembleDebug --stacktrace --warning-mode all

      - name: 列出 APK 文件
        run: |
          echo "=== 查找所有 APK 文件 ==="
          find android_app -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== 文件大小 ==="
          find android_app -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoQuant-v${{ steps.version.outputs.version }}-debug
          path: android_app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 构建摘要
        run: |
          echo "============================================"
          echo "  CryptoQuant APK 构建完成！"
          echo "  版本: v${{ steps.version.outputs.version }}"
          echo "  方案: Chaquopy 17.0 + Python 3.10"
          echo "============================================"
          find android_app -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null
          echo "============================================"
